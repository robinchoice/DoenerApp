services:
  app:
    image: ghcr.io/robinchoice/doener-api:latest
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=doener
      - DB_PASSWORD=${DB_PASSWORD:-doener}
      - DB_NAME=doenerapp
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ALLOW_DEV_LOGIN=${ALLOW_DEV_LOGIN:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=doenerapp
      - POSTGRES_USER=doener
      - POSTGRES_PASSWORD=${DB_PASSWORD:-doener}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doener -d doenerapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
