services:
  app:
    build:
      context: ..
      dockerfile: Backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=doener
      - DB_PASSWORD=${DB_PASSWORD:-doener}
      - DB_NAME=doenerapp
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ALLOW_DEV_LOGIN=${ALLOW_DEV_LOGIN:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=doenerapp
      - POSTGRES_USER=doener
      - POSTGRES_PASSWORD=${DB_PASSWORD:-doener}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doener -d doenerapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
