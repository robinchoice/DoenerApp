name: DoenerApp
options:
  bundleIdPrefix: com.robinchoice
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  developmentLanguage: de

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic

targets:
  DoenerApp:
    type: application
    platform: iOS
    sources:
      - path: DoenerApp
    entitlements:
      path: DoenerApp/DoenerApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robinchoice.doener
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Döner App braucht deinen Standort, um Döner-Läden in der Nähe anzuzeigen."
        INFOPLIST_KEY_CFBundleDisplayName: "Döner App"
        INFOPLIST_KEY_NSAppTransportSecurity: "{NSAllowsLocalNetworking = YES;}"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: DoenerApp/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocationWhenInUseUsageDescription: "Döner App braucht deinen Standort, um Döner-Läden in der Nähe anzuzeigen."
        CFBundleDisplayName: "Döner App"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

  DoenerAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoenerAppTests
    dependencies:
      - target: DoenerApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
